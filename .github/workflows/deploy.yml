name: IIS Deploy
on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.18.0"

      - name: Install Dependencies
        run: npm install

      - name: Run Lint
        run: npm run lint

      - name: Build Project
        run: npm run build

      - name: Deploy to IIS
        shell: powershell
        run: |
          Import-Module WebAdministration
          $appPoolName = "Petrik1"
          $sourcePath = Join-Path $PWD "dist"
          $destinationPath = "C:\Users\Administrator\Desktop\PETRIK1\dist"

          try {
            $poolState = (Get-WebAppPoolState -Name $appPoolName).Value
            if ($poolState -eq "Started") {
              Stop-WebAppPool -Name $appPoolName
            }

            if (-not (Test-Path -Path $destinationPath)) {
              New-Item -ItemType Directory -Path $destinationPath -Force | Out-Null
            }

            robocopy $sourcePath $destinationPath /MIR /R:2 /W:2 /NFL /NDL /NP
            $robocopyExitCode = $LASTEXITCODE
            if ($robocopyExitCode -gt 7) {
              throw "Robocopy failed with exit code $robocopyExitCode"
            }

            # GitHub Actions a nem nulla LASTEXITCODE-ot hibanak tekinti,
            # de a Robocopy 0-7 kozotti kodjai sikeres/allokalt allapotok.
            $global:LASTEXITCODE = 0
          }
          finally {
            $endState = (Get-WebAppPoolState -Name $appPoolName).Value
            if ($endState -ne "Started") {
              Start-WebAppPool -Name $appPoolName
            }
          }
